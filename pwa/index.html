<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Inventur</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/scanner.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>IT Inventur</h1>
            <p>Offline-First Asset Management</p>
        </header>

        <main>
            <!-- Login Section -->
            <section id="login-section" class="card" style="display: none;">
                <h2>Anmeldung</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Benutzername</label>
                        <input type="text" id="login-username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Passwort</label>
                        <input type="password" id="login-password" autocomplete="current-password" required>
                    </div>
                    <button type="submit">Anmelden</button>
                    <div id="login-status-msg" class="status-msg"></div>
                </form>
            </section>

            <!-- Company Selection Section -->
            <section id="company-section" class="card">
                <h2>Gesellschaft wählen</h2>
                <div class="form-group">
                    <select id="company-select" class="large-select">
                        <option value="">-- Bitte wählen --</option>
                    </select>
                </div>
                <button id="company-confirm-btn" disabled>Weiter</button>
            </section>

            <!-- Inventory Content (Hidden by default) -->
            <div id="inventory-content" style="display: none;">
                <!-- Input Section -->
                <section class="card">
                    <h2>Asset Erfassen</h2>
                    <form id="asset-form">
                        <div class="form-group">
                            <label for="serial_number">Seriennummer/Asset-Tag *</label>
                            <div class="input-with-button">
                                <input type="text" id="serial_number" placeholder="Scannen oder eingeben..." required
                                    autocomplete="off" style="text-transform: uppercase;">
                                <button type="button" id="scan-btn" class="scan-button" style="display: none;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                                        </path>
                                        <circle cx="12" cy="13" r="4"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="asset_model_id">Modell *</label>
                            <select id="asset_model_id" required>
                                <option value="">-- Modell wählen --</option>
                                <!-- Populated by JS -->
                            </select>
                            <div id="model-cache-hint" class="model-cache-hint"></div>
                        </div>

                        <div class="form-group">
                            <label for="location">Standort</label>
                            <input type="text" id="location" placeholder="z.B. Raum 204">
                        </div>

                        <div class="form-group">
                            <label for="comment">Kommentar</label>
                            <input type="text" id="comment" placeholder="Optional">
                        </div>

                        <button type="submit">Speichern</button>
                        <div id="status-msg" class="status-msg"></div>
                    </form>
                </section>

                <!-- List Section -->
                <section class="card">
                    <h2>Erfasste Assets</h2>
                    <div class="actions">
                        <button id="sync-now-btn" class="secondary">Online prüfen & Sync</button>
                    </div>
                    <div class="table-responsive">
                        <table id="inventory-table">
                            <thead>
                                <tr>
                                    <th>Serial</th>
                                    <th>Modell</th>
                                    <th>Standort</th>
                                    <th>Status</th>
                                    <th>Aktionen</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Scanner Modal -->
                <div id="scanner-modal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>Barcode scannen</h3>
                            <button type="button" id="close-scanner" class="close-btn">&times;</button>
                        </div>
                        <div id="scanner-container"></div>
                        <div id="scanner-status" class="scanner-status"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>

</html>
